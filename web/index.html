<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reminderd</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<a href="https://github.com/daominah/reminderd" target="_blank" class="github-link" title="GitHub"><svg viewBox="0 0 16 16" width="24" height="24" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>
<h1>reminderd</h1>

<div>
  Your activity is detected based on keyboard/mouse input.
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('history')">Activity History</button>
  <button class="tab" onclick="switchTab('config')">Configuration</button>
  <button class="tab" onclick="switchTab('notification')">Notification</button>
</div>

<div id="tab-history" class="tab-content active">
  <div class="quick-ranges" id="quickRanges">
    <button onclick="quickRange(60)" data-range="60">Last 1h</button>
    <button onclick="quickRange(240)" data-range="240">Last 4h</button>
    <button onclick="quickRange(480)" data-range="480">Last 8h</button>
    <button onclick="quickRange(720)" data-range="720">Last 12h</button>
    <button onclick="quickRange(1440)" data-range="1440">Last 24h</button>
    <button onclick="quickRange(2880)" data-range="2880">Last 2d</button>
    <button onclick="quickRange(10080)" data-range="10080">Last 7d</button>
    <button onclick="quickRange(43200)" data-range="43200">Last 30d</button>
    <button onclick="quickRange(262800)" data-range="262800">Last 6mo</button>
    <button onclick="quickRange(525600)" data-range="525600">Last 1y</button>
    <button onclick="quickRange(0)" data-range="0">All time</button>
  </div>
  <div id="summary" class="summary"></div>
  <div id="chart">
    <canvas id="canvas"></canvas>
    <div class="tooltip" id="tooltip"></div>
  </div>
</div>

<div id="tab-config" class="tab-content">
  <div class="config-section" id="configSection"></div>
</div>

<div id="tab-notification" class="tab-content">
  <button class="save-btn" onclick="testNotification()">Send Test Notification</button>
  <span id="testResult" class="status"></span>
</div>

<script src="chart_calc.js"></script>
<script src="app.js"></script>
</body>
</html>
